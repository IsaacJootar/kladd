services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kladd
      POSTGRES_USER: kladd
      POSTGRES_PASSWORD: kladd_local_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: kladd
      MINIO_ROOT_PASSWORD: kladd_local_password
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
